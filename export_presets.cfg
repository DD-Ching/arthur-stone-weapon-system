html/custom_html_shell=""
html/head_include="<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover\">\n<style>\nhtml,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#1f1c22;touch-action:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}\ncanvas{display:block;width:100%!important;height:100%!important;touch-action:none;outline:none;}\n#asws-rot{position:fixed;inset:0;z-index:100000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#1f1c22;color:#f4f1e8;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;text-align:center;padding:24px;box-sizing:border-box;}\n#asws-rot .g{font-size:64px;animation:asws-spin 1.8s ease-in-out infinite;}\n#asws-rot .zh{font-size:24px;font-weight:700;}\n#asws-rot .en{font-size:16px;opacity:.8;}\n@keyframes asws-spin{0%,40%{transform:rotate(0)}60%,100%{transform:rotate(90deg)}}\n@media (orientation:portrait) and (max-width:900px) and (pointer:coarse){#asws-rot{display:flex}}\n</style>\n<script>\nwindow.addEventListener('DOMContentLoaded',function(){var o=document.createElement('div');o.id='asws-rot';o.innerHTML='<div class=\"g\">📱</div><div class=\"zh\">請將手機轉為橫向</div><div class=\"en\">Rotate your phone to landscape</div>';document.body.appendChild(o);});\n(function(){var d=false;function go(){if(d)return;d=true;try{var e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen().catch(function(){});}catch(x){}try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(function(){});}catch(x){}}window.addEventListener('touchend',go,{once:true,passive:true});window.addEventListener('click',go,{once:true});})();\n</script>"
