name: Validate Godot project

# Smoke test: headlessly import the project with Godot 4. This catches broken
# scene/resource references and surfaces GDScript parse errors in the build log,
# without needing a display or export templates.

on:
  push:
    branches: [ main, dev ]
  pull_request:
  workflow_dispatch:

jobs:
  import:
    name: Headless import
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot 4
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false

      - name: Godot version
        run: godot --version

      - name: Import resources & parse scripts
        run: godot --headless --path . --import

      - name: Run swing smoke test (core mechanic)
        # Drives a real swing headlessly and asserts knockback + stamina cost +
        # the hit signal. The test quits non-zero on failure; grep is a belt-and-
        # braces check that the PASS line actually printed.
        run: |
          godot --headless --path . res://tests/SwingSmokeTest.tscn --quit-after 600 | tee smoke.log
          grep -q "SMOKE_VERDICT PASS" smoke.log

      - name: Run behaviour test (passive presence + slam)
        # Asserts the resting stone shoves an overlapping enemy, and the slam
        # spawns a shockwave, knocks back a nearby enemy, and drops debris.
        run: |
          godot --headless --path . res://tests/BehaviorTest.tscn --quit-after 600 | tee behavior.log
          grep -q "BEHAVIOR_VERDICT PASS" behavior.log

      - name: Run impact + Stone Flow test (v0.3 combo system)
        # Asserts a pinned (wall-crush) hit scores/damages more than an open hit,
        # charging raises the score, and Stone Flow gains on hits / loses on a miss.
        run: |
          godot --headless --path . res://tests/ImpactTest.tscn --quit-after 600 | tee impact.log
          grep -q "IMPACT_VERDICT PASS" impact.log

      - name: Run battlefield test (v0.4 enemy AI + objective)
        # Asserts enemy AI advances on Arthur, Arthur can be damaged, and defeating
        # the shield wall completes the "Break the Shield Wall" objective.
        run: |
          godot --headless --path . res://tests/BattleTest.tscn --quit-after 600 | tee battle.log
          grep -q "BATTLE_VERDICT PASS" battle.log

      - name: Run spin + KO test (v0.5 musou systems)
        # Asserts the spin whirlwind launches a ring of enemies outward + drains
        # stamina, and the KO counter increments with a milestone on round numbers.
        run: |
          godot --headless --path . res://tests/SpinTest.tscn --quit-after 600 | tee spin.log
          grep -q "SPIN_VERDICT PASS" spin.log

      - name: Run musou test (rage gauge + screen-clearing ultimate)
        # Asserts the musou gauge fills (musou_changed fires), the public ultimate
        # trigger spawns a big shockwave that launches/damages a ring of enemies, and
        # the gauge resets toward 0 after firing.
        run: |
          godot --headless --path . res://tests/MusouTest.tscn --quit-after 600 | tee musou.log
          grep -q "MUSOU_VERDICT PASS" musou.log

      - name: Run ford test (v0.7 river current + water wheel)
        # Asserts the river current drifts a loose body downstream, the water wheel
        # bats a body placed in it far away, and the named audio events fire.
        run: |
          godot --headless --path . res://tests/FordTest.tscn --quit-after 600 | tee ford.log
          grep -q "FORD_VERDICT PASS" ford.log

      - name: Run hold-the-ford test (v0.8 waves + allies + breaches)
        # Asserts allies spawn, the structured waves advance when the field clears, and
        # a raider crossing the defence line is counted as a breach that loses the ford.
        run: |
          godot --headless --path . res://tests/HoldFordTest.tscn --quit-after 600 | tee holdford.log
          grep -q "HOLDFORD_VERDICT PASS" holdford.log

      - name: Run ford-campaign test (Hold the Ford joins the campaign spine)
        # Asserts the original standalone Ford level got its campaign wiring: a reusable PauseMenu
        # overlay is present, a forced VICTORY fires the guarded Campaign.mark_completed (the Ford
        # reads CLEARED), and the ScoreScreen receives a non-empty next_path + blurb (5-arg form).
        run: |
          godot --headless --path . res://tests/FordCampaignTest.tscn --quit-after 600 | tee fordcampaign.log
          grep -q "FORDCAMPAIGN_VERDICT PASS" fordcampaign.log

      - name: Run objectives test (v0.10 ObjectiveManager)
        # Asserts the reusable objectives compose win/lose: completable objectives gate the
        # win, a constraint objective only gates losing, the officer must be defeated to win.
        run: |
          godot --headless --path . res://tests/ObjectivesTest.tscn --quit-after 600 | tee objectives.log
          grep -q "OBJ_VERDICT PASS" objectives.log

      - name: Run protect-banner test (ProtectBanner objective constraint)
        # Asserts the reusable ProtectBanner constraint: it holds while the allied banner
        # lives, fails (→ lose) once the ward is gone, never reports "done", and drives the
        # ObjectiveManager to emit a loss when the ward dies.
        run: |
          godot --headless --path . res://tests/ProtectBannerTest.tscn --quit-after 600 | tee protectbanner.log
          grep -q "PROTECT_OBJ_VERDICT PASS" protectbanner.log

      - name: Run formations test (v0.11 Formation module)
        # Asserts a placeable Formation spawns its configured roster on the right team with
        # the support rank arranged behind the front along the facing.
        run: |
          godot --headless --path . res://tests/FormationsTest.tscn --quit-after 600 | tee formations.log
          grep -q "FORM_VERDICT PASS" formations.log

      - name: Run charge-group test (ChargeGroup formation config)
        # Asserts the reusable ChargeGroup spawns a wide front rank of light chargers plus a
        # Cavalry commander, all on the raider team, facing down toward the defenders.
        run: |
          godot --headless --path . res://tests/ChargeGroupTest.tscn --quit-after 600 | tee chargegroup.log
          grep -q "CHARGE_GRP_VERDICT PASS" chargegroup.log

      - name: Run touch-controls test (v0.13 mobile play)
        # Asserts the virtual sticks produce an analog move vector + drive the existing
        # aim/attack so circling the right stick swings, and the SLAM/SPIN buttons press
        # and release the existing actions.
        run: |
          godot --headless --path . res://tests/TouchControlsTest.tscn --quit-after 600 | tee touch.log
          grep -q "TOUCH_VERDICT PASS" touch.log

      - name: Run HUD re-skin test (code-drawn bars + ULTIMATE readout + fading hints)
        # Asserts the re-skinned HUD: the code-drawn status bars render without error, the WEAPON
        # read-out is human-readable (a swing charge shows "CHARGE NN%", never the cryptic "POWER"),
        # the ULTIMATE bar announces READY at a full gauge, and the control-hint strip fades after
        # its hold window (teach-then-hide) and is restorable via replay_hints().
        run: |
          godot --headless --path . res://tests/HudReskinTest.tscn --quit-after 600 | tee hudreskin.log
          grep -q "HUD_RESKIN_VERDICT PASS" hudreskin.log

      - name: Run HUD mobile test (compact bars on a short / touch viewport)
        # Asserts the phone-compacting HUD pass: the NARROW bar geometry consts are smaller than the
        # desktop defaults, forcing a short logical viewport makes _apply_scale() shrink the live
        # BAR_W / ROW_H / BAR_TOP vars + move the bar-row labels up (smaller font), restoring a tall
        # viewport returns the desktop layout verbatim, and the bars draw without error in both.
        run: |
          godot --headless --path . res://tests/HudMobileTest.tscn --quit-after 600 | tee hudmobile.log
          grep -q "HUD_MOBILE_VERDICT PASS" hudmobile.log

      - name: Run navigation test (v0.14 obstacle avoidance)
        # Asserts a marching raider routes AROUND a solid wall (world layer) through the
        # gap to reach its goal, instead of jamming against it (the Steering module).
        run: |
          godot --headless --path . res://tests/NavTest.tscn --quit-after 3000 | tee nav.log
          grep -q "NAV_VERDICT PASS" nav.log

      - name: Run abilities test (v0.14 data-driven moves)
        # Asserts the Ability system: javelin spawns a projectile that damages an opposing
        # foe, pound deals an instant radial AoE (and spares allies), and the library picks
        # a gap-closer when far / a melee when close.
        run: |
          godot --headless --path . res://tests/AbilitiesTest.tscn --quit-after 600 | tee abilities.log
          grep -q "ABIL_VERDICT PASS" abilities.log

      - name: Run visual-readability test (enriched enemy silhouettes/telegraphs)
        # Asserts the additive enemy DRAWING enrichments are sound: every look (soldier/shield/
        # spear/heavy/banner/knight) plus a shielded + a support unit draw over a few frames with
        # no errors, and the pure geometry helpers return sane, non-empty silhouette/telegraph/aura
        # values. Purely visual — no gameplay change.
        run: |
          godot --headless --path . res://tests/VisualReadabilityTest.tscn --quit-after 600 | tee visread.log
          grep -q "VISREAD_VERDICT PASS" visread.log

      - name: Run soldier-art test (beautified light-footman silhouette)
        # Asserts the beautified light-footman art (scripts/art/SoldierArt.gd): a real LightSoldier
        # ("soldier" look) draws its enriched silhouette (sleek helm, short sword, buckler, tunic,
        # faction sash) across every faction plus a faded copy, over a few frames with no errors,
        # and survives with look "soldier". Purely visual — no gameplay change.
        run: |
          godot --headless --path . res://tests/SoldierArtTest.tscn --quit-after 600 | tee soldierart.log
          grep -q "ART_SOLDIER_VERDICT PASS" soldierart.log

      - name: Run beautify test (faction colour theming + enriched silhouettes)
        # Asserts the additive faction-beautification drawing: every (look x faction) combo draws
        # over a few frames with no errors, faction_color() returns the expected hue per kingdom
        # (Wei blue / Shu green / Wu red / neutral grey), and the pure body_color() helper shifts a
        # unit toward its faction colour (neutral stays put). Purely visual — no gameplay change.
        run: |
          godot --headless --path . res://tests/BeautifyTest.tscn --quit-after 600 | tee beautify.log
          grep -q "BEAUTIFY_VERDICT PASS" beautify.log

      - name: Run shield-art test (beautified plated shieldbearer)
        # Asserts the beautified shieldbearer art (scripts/art/ShieldArt.gd): the shipped
        # ShieldSoldier.tscn (look == "shield") draws over a few frames with no errors in BOTH the
        # intact plated state (boss + bright rim + faction emblem + helmet) AND the forced broken
        # state (e._shield_broken = 3.0 → shattered), across factions, with the unit staying alive.
        run: |
          godot --headless --path . res://tests/ShieldArtTest.tscn --quit-after 600 | tee shieldart.log
          grep -q "ART_SHIELD_VERDICT PASS" shieldart.log

      - name: Run bowling-room test (chain-impact challenge level)
        # Asserts the Bowling Room: a heavy striker launched into a packed wedge of pins chains
        # bowling impacts (Impact's enemy-to-enemy collisions) to knock multiple pins out, and
        # the room's win-detection fires once the cluster is cleared — but not before the strike.
        run: |
          godot --headless --path . res://tests/BowlingRoomTest.tscn --quit-after 600 | tee bowling.log
          grep -q "BOWL_ROOM_VERDICT PASS" bowling.log

      - name: Run wall-crush room test (challenge level #2)
        # Asserts the shared Impact.cushion raycast detects a wall behind a pinned enemy (and
        # reads ~0 in open space), a strong pinning hit defeats it, and the WallCrushRoom
        # scene recognises "field cleared → win".
        run: |
          godot --headless --path . res://tests/WallCrushRoomTest.tscn --quit-after 600 | tee wallroom.log
          grep -q "WALL_ROOM_VERDICT PASS" wallroom.log

      - name: Run rock-launcher-room test (challenge level #3)
        # Asserts a Rock launched at speed into an enemy registers a real hit via
        # Impact.collide (damage + knockback), and the room recognises "all enemies
        # defeated -> win" through its composed ClearRoomObjective.
        run: |
          godot --headless --path . res://tests/RockLauncherRoomTest.tscn --quit-after 600 | tee rockroom.log
          grep -q "ROCK_ROOM_VERDICT PASS" rockroom.log

      - name: Run combo trial room test (challenge level — Stone Flow race)
        # Asserts the Combo Trial Room wins when Stone Flow stacks reach the target in time
        # (driven via Impact.add_flow, the hit path), and loses when the timer expires below it.
        run: |
          godot --headless --path . res://tests/ComboTrialRoomTest.tscn --quit-after 600 | tee combo.log
          grep -q "COMBO_ROOM_VERDICT PASS" combo.log

      - name: Run room-campaign test (rooms end → ScoreScreen + Campaign)
        # Asserts the RoomFinish glue closes the challenge-room dead-end: a BowlingRoom driven to a
        # win marks the stage CLEARED in the Campaign and reveals a VICTORY ScoreScreen handed a
        # non-empty next_path, and a room can register a loss (a DEFEAT ScoreScreen, no false clear).
        run: |
          godot --headless --path . res://tests/RoomCampaignTest.tscn --quit-after 600 | tee roomcampaign.log
          grep -q "ROOMCAMPAIGN_VERDICT PASS" roomcampaign.log

      - name: Run score-screen test (v0.15 KO + time result overlay)
        # Asserts the end-of-battle ScoreScreen reveals on a result and its labels show the
        # KO count, the elapsed time formatted m:ss, and the right VICTORY/DEFEAT word.
        run: |
          godot --headless --path . res://tests/ScoreScreenTest.tscn --quit-after 600 | tee score.log
          grep -q "SCORE_UI_VERDICT PASS" score.log

      - name: Run terrain-scenes test (placeable terrain building blocks)
        # Asserts the placeable RiverZone drifts a loose body downstream + damps a fast body
        # via drag, and the Fence is a solid StaticBody2D on the world layer with a shape.
        run: |
          godot --headless --path . res://tests/TerrainScenesTest.tscn --quit-after 600 | tee terrain_scenes.log
          grep -q "TERRAIN_SCN_VERDICT PASS" terrain_scenes.log

      - name: Run wave-spawner test (data-driven waves as a Resource)
        # Asserts a WaveSpawner .tres materializes its waves by reusing the shared modules:
        # a loose wave spawns N raiders via Spawner, a formation wave marches in via Formation,
        # and a non-default team re-tags loose units onto the right side.
        run: |
          godot --headless --path . res://tests/WaveSpawnerTest.tscn --quit-after 600 | tee wavespawner.log
          grep -q "WAVESPAWN_VERDICT PASS" wavespawner.log

      - name: Run enemy variants test (new raider configs)
        # Asserts the three pure-.tscn raider variants (Archer / Brute / Outrider) join the
        # raider groups, build one Ability per `moves` id, act without error, and take damage.
        run: |
          godot --headless --path . res://tests/EnemyVariantsTest.tscn --quit-after 600 | tee variants.log
          grep -q "VARIANTS_VERDICT PASS" variants.log

      - name: Run battle-map base test (Musou map foundation)
        # Asserts the reusable BattleMap base boots (Arthur + HUD + score screen), spawns its
        # wave via WaveSpawner, and reaches victory once the field is cleared (RepelWaves).
        run: |
          godot --headless --path . res://tests/BattleMapTest.tscn --quit-after 600 | tee battlemap.log
          grep -q "MAP_VERDICT PASS" battlemap.log

      - name: Run Hu Lao Gate test (虎牢關 gate-chokepoint map)
        # Asserts the Hu Lao Gate BattleMap subclass boots (Arthur + HUD), the Wei raiders spawn
        # through the gate funnel, and clearing the field drives all five waves + the officer
        # down to victory (RepelWaves + DefeatOfficer through the shared BattleMap loop).
        run: |
          godot --headless --path . res://tests/HuLaoGateTest.tscn --quit-after 600 | tee hulao.log
          grep -q "HULAO_VERDICT PASS" hulao.log

      - name: Run Red Cliffs map test (赤壁 fire + river + FireZone)
        run: |
          godot --headless --path . res://tests/RedCliffsTest.tscn --quit-after 600 | tee redcliffs.log
          grep -q "CHIBI_VERDICT PASS" redcliffs.log

      - name: Run Guandu map test (官渡 base capture)
        run: |
          godot --headless --path . res://tests/GuanduTest.tscn --quit-after 600 | tee guandu.log
          grep -q "GUANDU_VERDICT PASS" guandu.log

      - name: Run Lady of the Lake map test (Avalon shrine-capture + lake)
        run: |
          godot --headless --path . res://tests/LadyOfLakeTest.tscn --quit-after 600 | tee ladyoflake.log
          grep -q "AVALON_VERDICT PASS" ladyoflake.log

      - name: Run Changban map test (長坂坡 escort/protect)
        run: |
          godot --headless --path . res://tests/ChangbanTest.tscn --quit-after 600 | tee changban.log
          grep -q "CHANGBAN_VERDICT PASS" changban.log

      - name: Run map-decor test (長坂坡 Changban dressed, retreat lane kept clear)
        # Asserts the Changban escort map boots with no parse/script error (Arthur + HUD up), the
        # field is DRESSED (banners/drums in "decor" + shovable crates/rocks placed), and the
        # central retreat corridor is kept clear so the escort/ward path isn't blocked.
        run: |
          godot --headless --path . res://tests/MapDecorTest.tscn --quit-after 600 | tee mapdecor.log
          grep -q "MAPDECOR_VERDICT PASS" mapdecor.log

      - name: Run Yellow Turban map test (黃巾 survival + SurviveObjective)
        run: |
          godot --headless --path . res://tests/YellowTurbanTest.tscn --quit-after 600 | tee yellowturban.log
          grep -q "YELLOWTURBAN_VERDICT PASS" yellowturban.log

      - name: Run Sword in the Stone map test (Arthur's origin trial — RepelWaves + DefeatOfficer)
        # Asserts The Sword in the Stone BattleMap subclass boots (Arthur + HUD), the doubting
        # lords (Mordred's rebels) spawn through the chapel doorway, and clearing the field drives
        # all five waves + the rival lord's officer down to victory through the shared loop.
        run: |
          godot --headless --path . res://tests/SwordInStoneTest.tscn --quit-after 600 | tee swordstone.log
          grep -q "SWORDSTONE_VERDICT PASS" swordstone.log

      - name: Run Named generals test (武將 boss units)
        run: |
          godot --headless --path . res://tests/GeneralsTest.tscn --quit-after 600 | tee generals.log
          grep -q "GENERALS_VERDICT PASS" generals.log

      - name: Run Villain generals test (Arthurian boss enemies)
        # Asserts the four Arthurian villain bosses (Mordred / Black Knight / Saxon Warlord /
        # Morgan le Fay) join "generals" + the raider groups, build their moveset (or, for the
        # support sorceress Morgan, join "officers"), act without error near a foe, and take damage.
        run: |
          godot --headless --path . res://tests/VillainsTest.tscn --quit-after 600 | tee villains.log
          grep -q "VILLAINS_VERDICT PASS" villains.log

      - name: Run New troop types test
        run: |
          godot --headless --path . res://tests/TroopsTest.tscn --quit-after 600 | tee troops.log
          grep -q "TROOPS_VERDICT PASS" troops.log

      - name: Run Boss healthbar UI test
        run: |
          godot --headless --path . res://tests/BossHealthbarTest.tscn --quit-after 600 | tee bosshealthbar.log
          grep -q "BOSSBAR_VERDICT PASS" bosshealthbar.log

      - name: Run Stage select menu test
        run: |
          godot --headless --path . res://tests/StageSelectTest.tscn --quit-after 600 | tee stageselect.log
          grep -q "STAGESELECT_VERDICT PASS" stageselect.log

      - name: Run Arthurian stage-select test (legend-first menu + sections)
        # Asserts the King-Arthur re-theme of the boot menu: the Arthurian title is set, the
        # battles regroup into sections (Arthur legend → ford/trials → 三國 BONUS), the still-
        # missing Arthurian maps are guarded/skipped, and navigation only ever lands on a real
        # selectable battle (never a section header) while still wrapping correctly.
        run: |
          godot --headless --path . res://tests/StageArthurTest.tscn --quit-after 600 | tee stagearthur.log
          grep -q "STAGEARTHUR_VERDICT PASS" stagearthur.log

      - name: Run Faction banners + decor props test
        run: |
          godot --headless --path . res://tests/DecorTest.tscn --quit-after 600 | tee decor.log
          grep -q "DECOR_VERDICT PASS" decor.log

      - name: Run Spearman art test (槍兵 beautified spear silhouette)
        run: |
          godot --headless --path . res://tests/SpearArtTest.tscn --quit-after 600 | tee spearart.log
          grep -q "ART_SPEAR_VERDICT PASS" spearart.log

      - name: Run HeavyArtTest (per-unit art beautification)
        run: |
          godot --headless --path . res://tests/HeavyArtTest.tscn --quit-after 600 | tee heavyart.log
          grep -q "ART_HEAVY_VERDICT PASS" heavyart.log

      - name: Run BannerArtTest (per-unit art beautification)
        run: |
          godot --headless --path . res://tests/BannerArtTest.tscn --quit-after 600 | tee bannerart.log
          grep -q "ART_BANNER_VERDICT PASS" bannerart.log

      - name: Run KnightArtTest (per-unit art beautification)
        run: |
          godot --headless --path . res://tests/KnightArtTest.tscn --quit-after 600 | tee knightart.log
          grep -q "ART_KNIGHT_VERDICT PASS" knightart.log

      - name: Run CavalryArtTest (per-unit art beautification)
        run: |
          godot --headless --path . res://tests/CavalryArtTest.tscn --quit-after 600 | tee cavalryart.log
          grep -q "ART_CAVALRY_VERDICT PASS" cavalryart.log

      - name: Run ExcaliburArtTest (radiant Excalibur champion silhouette)
        # Asserts the beautified Excalibur-champion art (scripts/art/ExcaliburArt.gd): the shipped
        # res://scenes/knights/Lancelot.tscn (look "excalibur") draws across factions/facings and as
        # a LEGENDARY general without error, keeps its look, and survives. Purely visual — no gameplay.
        run: |
          godot --headless --path . res://tests/ExcaliburArtTest.tscn --quit-after 600 | tee excaliburart.log
          grep -q "ART_EXCALIBUR_VERDICT PASS" excaliburart.log

      - name: Run Defend Camelot map test (castle siege — hold the gate)
        # Asserts the Defend Camelot BattleMap subclass boots (Arthur + HUD), the besiegers spawn
        # through the castle-gate funnel, and clearing the field drives every siege wave + the
        # commander down to victory (RepelWaves + DefeatOfficer + HoldLine) with no breaches.
        run: |
          godot --headless --path . res://tests/DefendCamelotTest.tscn --quit-after 600 | tee camelot.log
          grep -q "CAMELOT_VERDICT PASS" camelot.log

      - name: Run MountBadonTest (Arthurian re-theme)
        run: |
          godot --headless --path . res://tests/MountBadonTest.tscn --quit-after 600 | tee badon.log
          grep -q "BADON_VERDICT PASS" badon.log

      - name: Run CamlannTest (Arthurian re-theme)
        run: |
          godot --headless --path . res://tests/CamlannTest.tscn --quit-after 600 | tee camlann.log
          grep -q "CAMLANN_VERDICT PASS" camlann.log

      - name: Run KnightsTest (Arthurian re-theme)
        run: |
          godot --headless --path . res://tests/KnightsTest.tscn --quit-after 600 | tee knights.log
          grep -q "KNIGHTS_VERDICT PASS" knights.log

      - name: Run ArthurTroopsTest (Arthurian re-theme)
        run: |
          godot --headless --path . res://tests/ArthurTroopsTest.tscn --quit-after 600 | tee arthurtroops.log
          grep -q "ARTHURTROOPS_VERDICT PASS" arthurtroops.log

      - name: Run ArthurDecorTest (Arthurian re-theme)
        run: |
          godot --headless --path . res://tests/ArthurDecorTest.tscn --quit-after 600 | tee arthurdecor.log
          grep -q "ARTHURDECOR_VERDICT PASS" arthurdecor.log

      - name: Run SorceressArtTest (Arthurian unit art)
        run: |
          godot --headless --path . res://tests/SorceressArtTest.tscn --quit-after 600 | tee sorceressart.log
          grep -q "ART_SORCERESS_VERDICT PASS" sorceressart.log

      - name: Run MordredArtTest (traitor-prince final-boss silhouette)
        # Asserts the beautified Mordred art (scripts/art/MordredArt.gd): the shipped final-boss
        # res://scenes/villains/Mordred.tscn (look "mordred", is_general) draws across many facings,
        # as BOTH a legendary general and a demoted rank-and-file, and through the defeat-fade alpha,
        # all without error, keeping its look. Purely visual — no gameplay change.
        run: |
          godot --headless --path . res://tests/MordredArtTest.tscn --quit-after 600 | tee mordredart.log
          grep -q "ART_MORDRED_VERDICT PASS" mordredart.log

      - name: Run WarlordArtTest (Arthurian villain art)
        run: |
          godot --headless --path . res://tests/WarlordArtTest.tscn --quit-after 600 | tee warlordart.log
          grep -q "ART_WARLORD_VERDICT PASS" warlordart.log

      - name: Run BlackKnightArtTest (Arthurian villain art)
        run: |
          godot --headless --path . res://tests/BlackKnightArtTest.tscn --quit-after 600 | tee blackknightart.log
          grep -q "ART_BLACKKNIGHT_VERDICT PASS" blackknightart.log

      - name: Run CampaignTest (story-progression backbone)
        # Asserts the Campaign autoload: an ordered stage table led by the Arthurian legend, the
        # legend unlocking in order (clear a battle to open the next) while the bonus stays open,
        # mark_completed/next_path/reset, and a story blurb per stage.
        run: |
          godot --headless --path . res://tests/CampaignTest.tscn --quit-after 600 | tee campaign.log
          grep -q "CAMPAIGN_VERDICT PASS" campaign.log

      - name: Run FinaleAudioTest (victory/defeat audio + campaign finale)
        # Asserts the big-moment finale: ScoreScreen.show_result chooses the victory_fanfare event
        # on a win + the defeat_knell on a loss (event NAME, headless has no audio device) and both
        # voices are registered in SoundBank; Campaign.is_section_complete(SEC_ARTHUR) flips true
        # once every Arthurian battle is cleared and is_finale(last) is true; cleared_count tracks.
        run: |
          godot --headless --path . res://tests/FinaleAudioTest.tscn --quit-after 600 | tee finale.log
          grep -q "FINALE_VERDICT PASS" finale.log

      - name: Run MenuListTest (reusable overlay navigation)
        # Asserts the shared MenuList component (PauseMenu + ScoreScreen lean on it): set_items,
        # wrapping focus, and activate() emitting chosen(id).
        run: |
          godot --headless --path . res://tests/MenuListTest.tscn --quit-after 600 | tee menulist.log
          grep -q "MENULIST_VERDICT PASS" menulist.log

      - name: Run PauseMenuTest (return-to-lobby overlay)
        # Asserts the reusable PauseMenu: runs while paused (ALWAYS) + joins "pause_menu", offers
        # Resume/Restart/Return-to-Lobby, open() pauses + reveals, close() unpauses, lock() disables.
        run: |
          godot --headless --path . res://tests/PauseMenuTest.tscn --quit-after 600 | tee pausemenu.log
          grep -q "PAUSE_VERDICT PASS" pausemenu.log

      - name: Run WinRulesTest (boss-gated, no instant win)
        # Asserts the win-rule fixes: DefeatGeneralObjective gates the win on the named boss,
        # RepelWaves' `started` guard kills the frame-0/no-wave instant win, and a composed manager
        # holds victory open until the boss is down.
        run: |
          godot --headless --path . res://tests/WinRulesTest.tscn --quit-after 600 | tee winrules.log
          grep -q "WINRULE_VERDICT PASS" winrules.log

      - name: Run SpinBalanceTest (anti spin-to-win)
        # Asserts the spin nerf + interrupt: an enemy hit landing while the stone whirls forces
        # the weapon OUT of the SPIN state (take_damage → stop_spin), and spin_speed_ref is now
        # well below the old free-screen-clear value (< 1000).
        run: |
          godot --headless --path . res://tests/SpinBalanceTest.tscn --quit-after 600 | tee spinbal.log
          grep -q "SPINBAL_VERDICT PASS" spinbal.log

      - name: Run StaminaFeelTest (soft low-stamina band)
        # Asserts running low on stamina is a readable TAPER, not a hard stop: below
        # low_stamina_threshold _speed_multiplier() is reduced but strictly > 0 (a crawl, not a
        # freeze), and even an empty pool stays above zero.
        run: |
          godot --headless --path . res://tests/StaminaFeelTest.tscn --quit-after 600 | tee stamfeel.log
          grep -q "STAMFEEL_VERDICT PASS" stamfeel.log

      - name: Run difficulty test (tougher raiders — no one-shot squishies)
        # Asserts the raider-toughness stat pass: LightSoldier.tscn now boots with
        # max_health >= 30 and survives ONE modest sub-lethal hit (health > 0, not dead),
        # proving a single flat swing no longer one-shots the squishiest raider.
        run: |
          godot --headless --path . res://tests/DifficultyTest.tscn --quit-after 600 | tee difficulty.log
          grep -q "DIFFIC_VERDICT PASS" difficulty.log

      - name: Run combat-fix test (every minion attacks + weapon clash)
        # Asserts every formerly-attackless support unit now carries an attack (a non-empty moveset)
        # so no raider just walks, and the weapon-clash parry hook (is_striking/parry_strike) cancels
        # + staggers an enemy caught mid-strike.
        run: |
          godot --headless --path . res://tests/CombatFixTest.tscn --quit-after 600 | tee combatfix.log
          grep -q "COMBATFIX_VERDICT PASS" combatfix.log

      - name: Run win-safety test (out-of-bounds softlock fix)
        # Asserts the win-safety net: a raider flung far outside the world (a wall-escaping
        # knockback) is hauled back in-bounds (or retired) by _recover_strays within a couple of
        # scans, so the last enemy can never be stranded off-map and make the battle unwinnable.
        run: |
          godot --headless --path . res://tests/WinSafetyTest.tscn --quit-after 600 | tee winsafe.log
          grep -q "WINSAFE_VERDICT PASS" winsafe.log

      - name: Run physics-foundation test (destruction + stone-blocks-arrows)
        # Asserts the physical-world foundation: a Breakable shatters into budgeted debris,
        # Impact.shatter caps at DEBRIS_BUDGET, Impact.explode hits a ring, and a javelin
        # deflects off a "stone_weapon" body instead of striking through it.
        run: |
          godot --headless --path . res://tests/PhysicsFoundationTest.tscn --quit-after 600 | tee physfound.log
          grep -q "PHYSFOUND_VERDICT PASS" physfound.log

      - name: Run materials test (basic smashable props — Barrel/SupplyCrate/ClayPot/Fence)
        # Asserts the four smashable materials (all configs of Breakable): hitting each past its
        # shatter threshold frees the prop and grows the shared "debris" group, and SupplyCrate
        # drops a hurlable Rock on break (the slam -> rock -> throw loop).
        run: |
          godot --headless --path . res://tests/MaterialsTest.tscn --quit-after 600 | tee materials.log
          grep -q "MATERIALS_VERDICT PASS" materials.log
      - name: Run fire-barrel test (explosive + fire materials)
        # Asserts the explosive/fire props: smashing a FireBarrel fires the shared Impact.explode
        # ring (launches/damages a nearby raider) AND drops a FireZone burning pool that whittles
        # down a unit standing in it over several ticks.
        run: |
          godot --headless --path . res://tests/FireBarrelTest.tscn --quit-after 600 | tee firebarrel.log
          grep -q "FIREBARREL_VERDICT PASS" firebarrel.log
      - name: Run archer-volley test (Saxon archers lob the shared javelin)
        # Asserts the archer-volley raiders: a few ai_enabled SaxonArchers placed within sight of
        # a target throw the shared Javelin projectile (at least one appears), and the concurrent
        # projectile count stays bounded (they self-free instead of flooding the scene).
        run: |
          godot --headless --path . res://tests/ArcherVolleyTest.tscn --quit-after 600 | tee archervolley.log
          grep -q "ARCHERVOLLEY_VERDICT PASS" archervolley.log

      - name: Run deflect test (raised stone breaks the volley)
        # Asserts the stone-deflects-arrows contract: a Javelin meeting a "stone_weapon" body goes
        # spent WITHOUT striking its target and pays the DEFLECT flow reward, while a javelin meeting
        # a normal opposing foe still lands — the deflect is the stone's privilege, not a blanket miss.
        run: |
          godot --headless --path . res://tests/DeflectTest.tscn --quit-after 600 | tee deflect.log
          grep -q "DEFLECT_VERDICT PASS" deflect.log

      - name: Run vignette test (screen-space battle frame)
        # Asserts the reusable Vignette overlay: it is a CanvasLayer below the HUD (layer 1) so it
        # never dims the HUD bars / pause / score, it builds a drawing child Control that ignores
        # the mouse (clicks pass through), and it survives a few frames with no error.
        run: |
          godot --headless --path . res://tests/VignetteTest.tscn --quit-after 600 | tee vignette.log
          grep -q "VIGNETTE_VERDICT PASS" vignette.log
      - name: Run slam-audio test (the heaviest move finally has a voice)
        # Asserts the SLAM voice + combat-audio additions: SoundBank registers the new "slam"
        # voice (a real non-empty procedural stream) plus the cheap "big_swing" / "combo_tier"
        # extras without dropping the originals, firing the events routes cleanly (headless has
        # no audio device — event path, not playback), and a real slam impact fires "slam".
        run: |
          godot --headless --path . res://tests/SlamAudioTest.tscn --quit-after 600 | tee slamaudio.log
          grep -q "SLAMAUDIO_VERDICT PASS" slamaudio.log
      - name: Run transition test (shared scene-change fade)
        # Asserts the Transition autoload (the hard-cut killer): it exposes change_scene(path), owns
        # an overlay CanvasLayer + full-rect ColorRect cover, is process_mode ALWAYS (so it fades
        # while the tree is paused — PauseMenu needs that), and arms the wipe on a valid path while
        # treating an empty / missing path as a guarded no-op. The real scene swap is stubbed.
        run: |
          godot --headless --path . res://tests/TransitionTest.tscn --quit-after 600 | tee transition.log
          grep -q "TRANSITION_VERDICT PASS" transition.log
      - name: Run mobile-perf test (touchscreen performance profile)
        # Asserts the touch performance dials that keep a phone smooth at peak swarm WITHOUT touching
        # desktop: Impact.DEBRIS_BUDGET is a positive number defaulting to the desktop 90 and
        # apply_mobile_profile lowers it to the mobile cap (and only ever lowers), a BattleMap's
        # _apply_mobile_profile lowers density (<=1.6) + active_cap (<=80) and never raises a value
        # already below the cap, and the desktop path (no touchscreen, no force) leaves every dial
        # byte-identical — so every other test, run desktop, sees unchanged numbers.
        run: |
          godot --headless --path . res://tests/MobilePerfTest.tscn --quit-after 600 | tee mobileperf.log
          grep -q "MOBILE_PERF_VERDICT PASS" mobileperf.log
